name: Mobile release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4

      - name: Restore release keystore
        env:
          DWAYNE_RELEASE_KEYSTORE_BASE64: ${{ secrets.DWAYNE_RELEASE_KEYSTORE_BASE64 }}
        run: |
          test -n "$DWAYNE_RELEASE_KEYSTORE_BASE64"
          mkdir -p keystores
          printf '%s' "$DWAYNE_RELEASE_KEYSTORE_BASE64" | base64 --decode > keystores/dwayne-release.jks

      - name: Build release APK
        env:
          DWAYNE_RELEASE_STORE_FILE: keystores/dwayne-release.jks
          DWAYNE_RELEASE_STORE_PASSWORD: ${{ secrets.DWAYNE_RELEASE_STORE_PASSWORD }}
          DWAYNE_RELEASE_KEY_ALIAS: ${{ secrets.DWAYNE_RELEASE_KEY_ALIAS }}
          DWAYNE_RELEASE_KEY_PASSWORD: ${{ secrets.DWAYNE_RELEASE_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease

      - name: Verify and stage APK
        run: |
          version="$(awk -F'"' '/versionName =/ { print $2; exit }' app/build.gradle.kts)"
          apk="dist/dwayne-$version.apk"
          signer="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort | tail -n 1)"
          test -n "$signer"
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk "$apk"
          "$signer" verify --verbose "$apk"
          printf 'apk=%s\n' "$apk" >> "$GITHUB_OUTPUT"
        id: apk

      - uses: actions/upload-artifact@v4
        with:
          name: dwayne-android-release
          path: mobile/${{ steps.apk.outputs.apk }}
          if-no-files-found: error
