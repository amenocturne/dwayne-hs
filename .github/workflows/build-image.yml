name: Build & push image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/skril3366/dwayne:latest
            ghcr.io/skril3366/dwayne:${{ github.sha }}
          cache-from: |
            type=registry,ref=ghcr.io/skril3366/dwayne:buildcache
            type=gha
          cache-to: |
            type=registry,ref=ghcr.io/skril3366/dwayne:buildcache,mode=max
            type=gha,mode=max
